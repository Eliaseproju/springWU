<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet — Nirobet</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>

  <header id="header">
    <button class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </button>
    <div class="logo">Nirobet</div>
    <div class="header-right">
      <div class="balance-pill"><span class="balance-icon">◈</span>$1,240.50</div>
      <button class="btn-deposit">Deposit</button>
    </div>
  </header>

  <div class="overlay" id="overlay"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="nav-section-label">Main</div>
      <a href="index.html" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Home</span>
      </a>
      <a href="#" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <span class="nav-label">Casino</span>
      </a>
      <a href="#" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        <span class="nav-label">Sports</span>
      </a>
      <a href="#" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span class="nav-label">Originals</span>
      </a>
      <div class="nav-section-label">Account</div>
      <a href="promotions.html" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>
        <span class="nav-label">Promotions</span>
      </a>
      <a href="wallet.html" class="nav-link active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
        <span class="nav-label">Wallet</span>
      </a>
      <a href="#" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="nav-label">VIP Club</span>
      </a>
      <div class="sidebar-footer">
        <div class="user-row">
          <div class="user-avatar">EL</div>
          <div class="user-info">
            <div class="user-name">Elias</div>
            <div class="user-level">Silver · Level 4</div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="main" id="main">
    <div class="page-top">
      <h1 class="page-heading">Wallet</h1>
      <p class="page-sub">Manage your funds</p>
    </div>

    <div class="balance-row">
      <div class="bal-card main">
        <div class="bal-label">Balance</div>
        <div class="bal-amount">$1,240.50</div>
      </div>
      <div class="bal-card">
        <div class="bal-label">Bonus</div>
        <div class="bal-amount acc">$350.00</div>
      </div>
      <div class="bal-card">
        <div class="bal-label">Pending</div>
        <div class="bal-amount muted">$200.00</div>
      </div>
    </div>

    <div class="wallet-panels">
      <div class="wallet-panel">
        <h2 class="panel-title">Deposit</h2>
        <div class="method-row" id="dep-methods">
          <button class="method active">Bitcoin</button>
          <button class="method">Ethereum</button>
          <button class="method">USDT</button>
          <button class="method">Card</button>
        </div>
        <div class="form-group">
          <label>Amount (USD)</label>
          <input type="number" placeholder="100" min="10">
        </div>
        <div class="presets" id="dep-presets">
          <button class="preset" data-v="50">$50</button>
          <button class="preset" data-v="100">$100</button>
          <button class="preset" data-v="250">$250</button>
          <button class="preset" data-v="500">$500</button>
        </div>
        <button class="submit-btn">Deposit</button>
      </div>

      <div class="wallet-panel">
        <h2 class="panel-title">Withdraw</h2>
        <div class="method-row" id="wd-methods">
          <button class="method active">Bitcoin</button>
          <button class="method">Ethereum</button>
          <button class="method">Bank</button>
        </div>
        <div class="form-group">
          <label>Wallet address</label>
          <input type="text" placeholder="bc1q...">
        </div>
        <div class="form-group">
          <label>Amount (USD)</label>
          <input type="number" placeholder="50" min="20">
        </div>
        <div class="presets" id="wd-presets">
          <button class="preset" data-v="50">$50</button>
          <button class="preset" data-v="100">$100</button>
          <button class="preset" data-v="500">$500</button>
          <button class="preset" data-v="1000">$1,000</button>
        </div>
        <button class="submit-btn wd">Withdraw</button>
      </div>
    </div>
  </main>

  <script src="../js/main.js"></script>

</body>
</html>
